name: "Android Kernel Builder"
description: "Reliable CI action to build Android kernels with packaging and release support."

branding:
  icon: "activity"
  color: "blue"

inputs:
  build-dir:
    default: "target-kernel"
    
  clone-depth:
    default: "1"

  kernel-url:
    required: true

  kernel-branch:
    required: true

  defconfig:
    default: "defconfig"
    required: true

  arch:
    default: "arm64"
    required: true

  install-commands:
    default: binutils git make bc bison openssl curl zip kmod cpio flex libelf-dev libssl-dev libtfm-dev libc6-dev device-tree-compiler ca-certificates python3 xz-utils aria2 build-essential pigz coccinelle parallel

  extended-build-commands:
    default: ""

  use-clang:
    default: "false"

  use-aosp-clang:
    default: "false"

  aosp-clang-branch:
    default: ""
  
  aosp-clang-version:
    default: ""
  
  custom-clang-url:
    default: ""

  custom-clang-branch:
    default: ""

  use-gcc:
    default: "false"

  use-aosp-gcc:
    default: "false"
    
  aosp-gcc-branch:
    default: ""

  custom-gcc64-url:
    default: ""
  
  custom-gcc64-branch:
    default: ""

  custom-gcc32-url:
    default: ""
  
  custom-gcc32-branch:
    default: ""

  use-ccache:
    default: "false"

  show-ccache-stats:
    default: "false"

  use-ksu:
    default: "false"

  ksu-url-setup:
    default: "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh"

  ksu-version:
    default: ""

  use-anykernel3:
    default: "false"

  use-release:
    default: "false"

  release-name:
    default: "KernelBuild"
  
  use-extended-release-name:
    default: "false"

  access-token:
    required: false

runs:
  using: "composite"

  steps:

    # ----------------------------
    # INIT
    # ----------------------------
    - name: Init
      shell: bash
      run: |
        set -euo pipefail

        mkdir -p "${{ inputs.build-dir }}"
        
        echo "::group:: ⚙️ Saving Inputs to GITHUB_ENV"
        # kernel build
        echo "BUILD_DIR=${{ inputs.build-dir }}" >> $GITHUB_ENV
        echo "CLONE_DEPTH=${{ inputs.clone-depth }}" >> $GITHUB_ENV
        echo "KERNEL_URL=${{ inputs.kernel-url }}" >> $GITHUB_ENV
        echo "KERNEL_BRANCH=${{ inputs.kernel-branch }}" >> $GITHUB_ENV
        echo "DEFCONFIG=${{ inputs.defconfig }}" >> $GITHUB_ENV
        echo "ARCH=${{ inputs.arch }}" >> $GITHUB_ENV

        echo "INSTALL_COMMANDS=${{ inputs.install-commands }}" >> $GITHUB_ENV
        echo "EXTENDED_BUILD_COMMANDS=${{ inputs.extended-build-commands }}" >> $GITHUB_ENV
        
        # clang
        echo "USE_CLANG=${{ inputs.use-clang }}" >> $GITHUB_ENV
        echo "USE_AOSP_CLANG=${{ inputs.use-aosp-clang }}" >> $GITHUB_ENV
        echo "AOSP_CLANG_BRANCH=${{ inputs.aosp-clang-branch }}" >> $GITHUB_ENV
        echo "AOSP_CLANG_DEFAULT_BRANCH=android10-d4-release" >> $GITHUB_ENV
        echo "AOSP_CLANG_VERSION=${{ inputs.aosp-clang-version }}" >> $GITHUB_ENV
        echo "AOSP_CLANG_DEFAULT_VERSION=clang-r353983d" >> $GITHUB_ENV
        echo "CUSTOM_CLANG_URL=${{ inputs.custom-clang-url }}" >> $GITHUB_ENV
        echo "CUSTOM_CLANG_BRANCH=${{ inputs.custom-clang-branch }}" >> $GITHUB_ENV
        
        # gcc
        echo "USE_AOSP_GCC=${{ inputs.use-aosp-gcc }}" >> $GITHUB_ENV
        echo "AOSP_GCC_BRANCH=${{ inputs.aosp-gcc-branch }}" >> $GITHUB_ENV
        echo "AOSP_GCC_DEFAULT_BRANCH=android10-d4-release" >> $GITHUB_ENV
        echo "CUSTOM_GCC64_URL=${{ inputs.custom-gcc64-url }}" >> $GITHUB_ENV
        echo "CUSTOM_GCC64_BRANCH=${{ inputs.custom-gcc64-branch }}" >> $GITHUB_ENV
        echo "CUSTOM_GCC32_URL=${{ inputs.custom-gcc32-url }}" >> $GITHUB_ENV
        echo "CUSTOM_GCC32_BRANCH=${{ inputs.custom-gcc32-branch }}" >> $GITHUB_ENV

        # cache
        echo "USE_CCACHE=${{ inputs.use-ccache }}" >> $GITHUB_ENV
        echo "SHOW_CCACHE_STATS=${{ inputs.show-ccache-stats }}" >> $GITHUB_ENV

        # kernelsu
        echo "USE_KSU=${{ inputs.use-ksu }}" >> $GITHUB_ENV
        echo "KSU_URL_SETUP=${{ inputs.ksu-url-setup }}" >> $GITHUB_ENV
        echo "KSU_VERSION=${{ inputs.ksu-version }}" >> $GITHUB_ENV

        # release
        echo "USE_RELEASE=${{ inputs.use-release }}" >> $GITHUB_ENV
        echo "RELEASE_NAME=${{ inputs.release-name }}" >> $GITHUB_ENV
        echo "USE_EXTENDED_RELEASE_NAME=${{ inputs.use-extended-release-name }}" >> $GITHUB_ENV
        echo "::endgroup::"
        
        echo "::group:: ⚙️ Saving Functions to functions.sh"
        cat << 'EOF' > functions.sh
        #!/usr/bin/env bash
        
        # download and extract files supports zip,tar,gz,xz,bz2,git
        download_and_extract() {
          local url=$1
          local output_name=$2
          local extract_dir=$3
          local branch=${4:-main}
          mkdir -p -v "$extract_dir"
          case "$url" in
            *.zip)
              aria2c -o "${output_name}.zip" "$url"
              unzip -q "${output_name}.zip" -d "$extract_dir"
              ;;
            *.tar.*|*.gz|*.xz|*.bz2)
              # Simpler extraction: tar -xf auto-detects compression format
              aria2c -o "${output_name}_archive" "$url"
              tar -C "$extract_dir" -xf "${output_name}_archive"
              ;;
            *)
              # Ensure CLONE_DEPTH has a fallback value if not set in env
              git clone "$url" "$extract_dir" --depth="${CLONE_DEPTH:-1}" -b "$branch"
              ;;
          esac
        }
        
        check_defconfig() {
          local -n defconfig_ref="$1"   # <-- reference to caller variable
          local arch="$2"
          local config_dir="arch/${arch}/configs"
        
          # Extract filename
          local defconfig_name
          defconfig_name="$(basename "$defconfig_ref")"
        
          # Case 1: already in root
          if [ -f "${config_dir}/${defconfig_name}" ]; then
            echo "::notice:: Defconfig found at root: ${defconfig_name}"
            defconfig_ref="$defconfig_name"
            return 0
          fi
        
          # Case 2: nested path exists
          if [ -f "${config_dir}/${defconfig_ref}" ]; then
            echo "::notice:: Found nested defconfig: ${defconfig_ref}"
            echo "::notice:: Copying to ${config_dir}/${defconfig_name}"
        
            cp "${config_dir}/${defconfig_ref}" "${config_dir}/${defconfig_name}"
        
            defconfig_ref="$defconfig_name"
            return 0
          fi
        
          # Case 3: search for it
          local found_path
          found_path=$(find "${config_dir}" -type f -name "${defconfig_name}" | head -n 1)
        
          if [ -n "$found_path" ]; then
            echo "::notice:: Found defconfig at: ${found_path}"
            echo "::notice:: Copying to ${config_dir}/${defconfig_name}"
        
            cp "$found_path" "${config_dir}/${defconfig_name}"
        
            defconfig_ref="$defconfig_name"
            return 0
          fi
        
          echo "::error:: Defconfig not found: ${defconfig_ref}"
          return 1
        }
        EOF
        chmod +x functions.sh
        echo "::endgroup::"

    
    # ----------------------------
    # DEPENDENCIES
    # ----------------------------
    - name: Install dependencies
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install --no-install-recommends -y $INSTALL_COMMANDS

        if [[ "$USE_CCACHE" == "true" ]]; then
          sudo apt-get install -y ccache
        fi
        if [[ "$USE_CLANG" == "true" ]]; then
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CLANG_TRIPLE=aarch64-linux-gnu-" >> $GITHUB_ENV
        fi

    # ----------------------------
    # GCC
    # ----------------------------
    - name: GCC
      if: inputs.use-gcc == 'true'
      shell: bash
      run: |
        set -euo pipefail
        source "$GITHUB_WORKSPACE/functions.sh"

        echo "CROSS_COMPILE=aarch64-linux-android-" >> $GITHUB_ENV
        echo "CROSS_COMPILE_ARM32=arm-linux-androideabi-" >> $GITHUB_ENV

        echo "::group:: ⚙️ Setup GCC"
        if [[ $USE_AOSP_GCC == "true" ]]; then
          echo "::notice:: Using AOSP GCC"
          
          if [[ -n "$AOSP_GCC_BRANCH" ]]; then
            echo "::notice:: Using AOSP GCC arm-linux-androideabi-4.9 with branch ${AOSP_GCC_BRANCH}"
            AOSP_GCC64_URL="https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/heads/${AOSP_GCC_BRANCH}.tar.gz"
            AOSP_GCC32_URL="https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/+archive/refs/heads/${AOSP_GCC_BRANCH}.tar.gz"
          else
            echo "::notice:: Using AOSP GCC arm-linux-androideabi-4.9 with default branch ${AOSP_GCC_DEFAULT_BRANCH}"
            AOSP_GCC64_URL="https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9"
            AOSP_GCC32_URL="https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9"
            AOSP_GCC_BRANCH="${AOSP_GCC_DEFAULT_BRANCH}"
          fi
          
          download_and_extract "$AOSP_GCC64_URL" "aosp-gcc-aarch64" "${PWD}/aosp-gcc-64" "$AOSP_GCC_BRANCH"
          download_and_extract "$AOSP_GCC32_URL" "aosp-gcc-arm" "${PWD}/aosp-gcc-32" "$AOSP_GCC_BRANCH"
          
          echo "${PWD}/aosp-gcc-64/bin" >> $GITHUB_PATH
          echo "${PWD}/aosp-gcc-32/bin" >> $GITHUB_PATH
          
        else
          echo "::notice:: Using Custom GCC"
          
          if [[ -n "$CUSTOM_GCC64_URL" && -n "$CUSTOM_GCC64_BRANCH" ]]; then
            echo "::notice:: Using Custom GCC 64 URL - ${CUSTOM_GCC64_URL}"
            download_and_extract "$CUSTOM_GCC64_URL" "custom-gcc-64" "${PWD}/custom-gcc-64" "${CUSTOM_GCC64_BRANCH:-main}"
            echo "${PWD}/custom-gcc-64/bin" >> $GITHUB_PATH
          fi
          
          if [[ -n "$CUSTOM_GCC32_URL" && -n "$CUSTOM_GCC32_BRANCH" ]]; then
            echo "::notice:: Using Custom GCC 32 URL - ${CUSTOM_GCC32_URL}"
            download_and_extract "$CUSTOM_GCC32_URL" "custom-gcc-32" "${PWD}/custom-gcc-32" "${CUSTOM_GCC32_BRANCH:-main}"
            echo "${PWD}/custom-gcc-32/bin" >> $GITHUB_PATH
          fi
        fi

        echo "::endgroup::"

    # ----------------------------
    # CLANG
    # ----------------------------
    - name: Clang
      if: inputs.use-clang == 'true'
      shell: bash
      run: |
        set -euo pipefail
        source "$GITHUB_WORKSPACE/functions.sh"
        
        echo "CC=clang" >> $GITHUB_ENV
        echo "CXX=clang++" >> $GITHUB_ENV

        echo "::group:: ⚙️ Setup CLANG"
        if [[ $USE_AOSP_CLANG == "true" ]]; then
          echo "::notice:: Using AOSP clang"
          if [[ -n "$AOSP_CLANG_BRANCH" ]]; then
            echo "::notice:: Using AOSP Clang branch ${AOSP_CLANG_BRANCH} version ${AOSP_CLANG_VERSION}"
            AOSP_CLANG_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/${AOSP_CLANG_BRANCH}/${AOSP_CLANG_VERSION}.tar.gz"
          else
            echo "::notice:: Using Default AOSP Clang branch with ${AOSP_CLANG_DEFAULT_VERSION}"
            AOSP_CLANG_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/mirror-goog-main-llvm-toolchain-source/${AOSP_CLANG_DEFAULT_VERSION}.tar.gz"
          fi
          download_and_extract "$AOSP_CLANG_URL" "aosp-clang" "${PWD}/aosp-clang"
          echo "${PWD}/aosp-clang/bin" >> $GITHUB_PATH
        else
          echo "::notice:: Using Custom Clang URL with ${CUSTOM_CLANG_BRANCH}"
          download_and_extract "${CUSTOM_CLANG_URL}" "custom-clang" "${PWD}/custom-clang" "${CUSTOM_CLANG_BRANCH}"
          echo "${PWD}/custom-clang/bin" >> $GITHUB_PATH
        fi
        echo "::endgroup::"

    # ----------------------------
    # CLONE KERNEL
    # ----------------------------
    - name: Clone kernel
      shell: bash
      run: |
        set -euo pipefail

        git clone \
          --depth=$CLONE_DEPTH \
          -b "$KERNEL_BRANCH" \
          "$KERNEL_URL" \
          "${BUILD_DIR}"

    # ----------------------------
    # KERNELSU
    # ----------------------------
    - name: Setup KernelSU
      if: inputs.use-ksu == 'true'
      shell: bash
      run: |
        set -euo pipefail
        cd "${BUILD_DIR}"
        if [[ -z "$KSU_VERSION" ]]; then
          echo "::notice:: Using ${KSU_URL_SETUP}"
          curl -fsSL "$KSU_URL_SETUP" | bash
        else
          echo "::notice:: Using ${KSU_URL_SETUP} with ${KSU_VERSION}"
          curl -fsSL "$KSU_URL_SETUP" | bash -s "$KSU_VERSION"
        fi

        DEFCONFIG_PATH="arch/${ARCH}/configs/${{ inputs.defconfig }}"

        echo "::notice:: Enabling KernelSU in ${DEFCONFIG_PATH}"
        
        # Ensure file exists
        if [ ! -f "$DEFCONFIG_PATH" ]; then
          echo "::error:: Defconfig not found!"
          exit 1
        fi

        echo "::notice:: Remove any existing KSU lines (avoid duplicates/conflicts)"
        sed -i '/CONFIG_KSU/d' "$DEFCONFIG_PATH"

        echo "::notice:: Appending required config"
        echo "CONFIG_KSU=y" >> "$DEFCONFIG_PATH"
        
        # Optional (safer for compatibility)
        grep -q "CONFIG_KPROBES" "$DEFCONFIG_PATH" || echo "CONFIG_KPROBES=y" >> "$DEFCONFIG_PATH"
        grep -q "CONFIG_HAVE_KPROBES" "$DEFCONFIG_PATH" || echo "CONFIG_HAVE_KPROBES=y" >> "$DEFCONFIG_PATH"

        echo "Done"
        
    # ----------------------------
    # SETUP CCACHE
    # ----------------------------
    - name: Setup ccache
      if: inputs.use-ccache == 'true'
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-${{ inputs.defconfig }}
        restore-keys: |
          ${{ runner.os }}-${{ inputs.defconfig }}-
          ${{ runner.os }}-
        max-size: 10G
        # This automatically sets CCACHE_DIR and handles the save/restore logic
        append-timestamp: true 


    - name: Configure ccache Environment
      if: inputs.use-ccache == 'true'
      shell: bash
      run: |
        # These are your specific kernel-building tweaks
        ccache -o compiler_check=content
        ccache -o compression=true
        ccache -o compression_level=6
        ccache -o sloppiness=time_macros
        ccache -z # Reset stats for this run

        echo "CCACHE_NOHASHDIR=1" >> $GITHUB_ENV
        echo "CCACHE_BASEDIR=${GITHUB_WORKSPACE}" >> $GITHUB_ENV

        # Export variables for the 'make' command
        echo "CC=ccache clang" >> $GITHUB_ENV
        echo "CXX=ccache clang++" >> $GITHUB_ENV
        echo "HOSTCC=ccache gcc" >> $GITHUB_ENV
        echo "HOSTCXX=ccache g++" >> $GITHUB_ENV


    # ----------------------------
    # BUILD
    # ----------------------------
    - name: Build kernel
      shell: bash
      run: |
        set -euo pipefail
        source "$GITHUB_WORKSPACE/functions.sh"
        cd "${BUILD_DIR}"
        
        # Silence the warning that breaks version detection
        export ANDROID_SILENT_DEPRECATION=true
        export LLVM=1
        export LLVM_IAS=1
        export KBUILD_BUILD_TIMESTAMP="1970-01-01 00:00:00"

        # re-export all ENV vars in GITHUB_ENV to this shell
        export $(grep -v '^#' $GITHUB_ENV | xargs -d '\n')

        echo "::notice:: env PATH ${PATH}"
        echo "::notice:: env CC ${CC}"
        echo "::notice:: env CXX ${CXX}"
        echo "::notice:: env CLANG_TRIPLE ${CLANG_TRIPLE}"
        echo "::notice:: env CROSS_COMPILE ${CROSS_COMPILE}"
        echo "::notice:: env CROSS_COMPILE_ARM32 ${CROSS_COMPILE_ARM32}"
        
        echo "::notice:: checking clang version $($CC --version | head -n1)"
        
        echo "::notice:: Verifying config file ${DEFCONFIG}"
        check_defconfig DEFCONFIG "$ARCH"
        
        echo "::notice:: Configuring Kernel with $DEFCONFIG"
        # Configuration Phase
        make O=out ARCH="${ARCH}" "${DEFCONFIG}" \
             CC="${CC}" CXX="${CXX}" \
             CLANG_TRIPLE="${CLANG_TRIPLE}" \
             CROSS_COMPILE="${CROSS_COMPILE}" \
             CROSS_COMPILE_ARM32="${CROSS_COMPILE_ARM32}" \
             ${EXTENDED_BUILD_COMMANDS}
        
        # Auto-fill new config options to avoid hangs
        make O=out ARCH="${ARCH}" \
             CC="${CC}" CXX="${CXX}" \
             CLANG_TRIPLE="${CLANG_TRIPLE}" \
             CROSS_COMPILE="${CROSS_COMPILE}" \
             CROSS_COMPILE_ARM32="${CROSS_COMPILE_ARM32}" \
             ${EXTENDED_BUILD_COMMANDS}
        
        echo "::notice:: Starting Compilation"
        # Build Phase
        make -j$(nproc --all) O=out ARCH="${ARCH}" \
             CC="${CC}" CXX="${CXX}" \
             CLANG_TRIPLE="${CLANG_TRIPLE}" \
             CROSS_COMPILE="${CROSS_COMPILE}" \
             CROSS_COMPILE_ARM32="${CROSS_COMPILE_ARM32}" 

    # ----------------------------
    # CACHE Stats
    # ----------------------------
    - name: Show ccache stats
      if: inputs.show-ccache-stats == 'true'
      shell: bash
      run: ccache -s

    # ============================================================
    # 1. KERNEL RESOLVER (SINGLE SOURCE OF TRUTH)
    # ============================================================
    - name: Resolve kernel artifacts
      shell: bash
      run: |
        set -euo pipefail
    
        KERNEL_OUT="${BUILD_DIR}/out/arch/$ARCH/boot"
    
        echo "::notice:: Resolving kernel artifacts from $KERNEL_OUT"
    
        # ----------------------------
        # Kernel image resolution (unchanged features preserved)
        # ----------------------------
        KERNEL_IMAGE=$(find "$KERNEL_OUT" -maxdepth 1 -type f \
          \( \
            -name "Image" \
            -o -name "Image.gz" \
            -o -name "Image.gz-dtb" \
            -o -name "Image-dtb" \
            -o -name "Image.lz4" \
            -o -name "Image.lz4-dtb" \
          \) | head -n 1)
    
        if [[ -z "$KERNEL_IMAGE" ]]; then
          echo "::error:: Kernel image not found"
          ls -lah "$KERNEL_OUT" || true
          exit 1
        fi
    
        echo "::notice:: Kernel image: $(basename "$KERNEL_IMAGE")"
    
        # ----------------------------
        # DTB / DTBO detection (preserved)
        # ----------------------------
        HAS_DTB=false
        HAS_DTBO=false
    
        [[ -f "$KERNEL_OUT/dtb" ]] && HAS_DTB=true
        [[ -f "$KERNEL_OUT/dtbo.img" ]] && HAS_DTBO=true
    
        # ----------------------------
        # Export environment (single source of truth)
        # ----------------------------
        {
          echo "KERNEL_IMAGE=$KERNEL_IMAGE"
          echo "KERNEL_OUT=$KERNEL_OUT"
          echo "HAS_DTB=$HAS_DTB"
          echo "HAS_DTBO=$HAS_DTBO"
          echo "KERNEL_NAME=$RELEASE_NAME"
          echo "USE_KSU=$USE_KSU"
        } >> "$GITHUB_ENV"
    
    
    # ============================================================
    # 2. ARTIFACT PREPARATION (NORMALIZED OUTPUT LAYER)
    # ============================================================
    - name: Prepare artifacts
      shell: bash
      run: |
        set -euo pipefail
    
        mkdir -p build
    
        echo "::notice:: Preparing standardized artifacts"
    
        # kernel
        cp "$KERNEL_IMAGE" build/kernel
    
        # dtb/dtbo (unchanged behavior preserved)
        [[ "$HAS_DTB" == "true" ]] && cp "$KERNEL_OUT/dtb" build/
        [[ "$HAS_DTBO" == "true" ]] && cp "$KERNEL_OUT/dtbo.img" build/
    
        # metadata (unchanged feature)
        cat > build/kernel.info <<EOF
        Kernel: $KERNEL_NAME
        Image: $(basename "$KERNEL_IMAGE")
        KSU: $USE_KSU
        DTB: $HAS_DTB
        DTBO: $HAS_DTBO
        EOF
    
        echo "::notice:: Artifact layer ready"
    
    
    # ============================================================
    # 3. ANYKERNEL3 PACKAGER (PURE CONSUMER LAYER)
    # ============================================================
    - name: Package AnyKernel3
      if: inputs.use-anykernel3 == 'true'
      shell: bash
      run: |
        set -euo pipefail
    
        echo "::group:: AnyKernel3 Packaging (Architecture Mode)"
    
        AK3_DIR="anykernel3"
        STAGE="stage"
        STAGE_AK3="$STAGE/anykernel"
    
        mkdir -p "$STAGE_AK3"
    
        # ----------------------------
        # Clone minimal AnyKernel3
        # ----------------------------
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git "$AK3_DIR"
    
        # ----------------------------
        # Core whitelist (no deletion logic anymore)
        # ----------------------------
        cp "$AK3_DIR/anykernel.sh" "$STAGE_AK3/"
        [[ -d "$AK3_DIR/tools" ]] && cp -r "$AK3_DIR/tools" "$STAGE_AK3/"
    
        # ========================================================
        # USE PREPARED ARTIFACTS (NO FIND, NO REDETECTION)
        # ========================================================
        cp build/kernel "$STAGE/"
    
        [[ "$HAS_DTB" == "true" ]] && cp "$KERNEL_OUT/dtb" "$STAGE/"
        [[ "$HAS_DTBO" == "true" ]] && cp "$KERNEL_OUT/dtbo.img" "$STAGE/"
    
        cp build/kernel.info "$STAGE/"
    
        # ----------------------------
        # ZIP naming logic (unchanged behavior preserved)
        # ----------------------------
        BASE_NAME="$KERNEL_NAME"
    
        [[ "$USE_KSU" == "true" ]] && BASE_NAME="${BASE_NAME}-ksu"
    
        if [[ "$KERNEL_IMAGE" == *"lz4"* ]]; then
          BASE_NAME="${BASE_NAME}-lz4"
        elif [[ "$KERNEL_IMAGE" == *"gz"* ]]; then
          BASE_NAME="${BASE_NAME}-gz"
        fi
    
        ZIP_NAME="${BASE_NAME}.zip"
    
        echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"
    
        echo "::notice:: Packaging $ZIP_NAME"
    
        # ----------------------------
        # Build ZIP (deterministic)
        # ----------------------------
        cd "$STAGE"
    
        zip -r -X "../$ZIP_NAME" . \
          -x "*.git*" "*.DS_Store*" "*/__pycache__/*"
    
        cd ..
    
        mkdir -p build
        mv "$ZIP_NAME" build/
    
        echo "::notice:: Done -> build/$ZIP_NAME"
    
        echo "::endgroup::"
    
    
    # ============================================================
    # 4. ARTIFACT UPLOAD (UNCHANGED LOGIC)
    # ============================================================
    - name: Upload kernel artifacts
      if: inputs.use-release == 'false' && inputs.use-anykernel3 == 'false'
      uses: actions/upload-artifact@v4
      with:
        name: kernel-build
        path: build/*
    
    
    - name: Upload AnyKernel3 artifacts
      if: inputs.use-release == 'false' && inputs.use-anykernel3 == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: anykernel3-package
        path: build/*
    
    
    # ============================================================
    # 5. RELEASE (UNCHANGED)
    # ============================================================
    - name: Create Release
      if: inputs.use-release == 'true'
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ inputs.access-token }}
      with:
        name: ${{ inputs.release-name }}
        tag_name: ${{ inputs.release-name }}-${{ github.sha }}
        files: build/*
        make_latest: true
