name: "Android Kernel Builder"
description: "Reliable CI action to build Android kernels with packaging and release support."

branding:
  icon: "activity"
  color: "blue"

inputs:

  clone-depth:
    default: "1"

  kernel-url:
    required: true

  kernel-branch:
    required: true

  defconfig:
    default: "defconfig"
    required: true

  arch:
    default: "arm64"
    required: true

  use-custom-clang:
    default: "false"
  
  clang-url:
    default: ""

  use-ccache:
    default: "false"

  show-ccache-stats:
    default: "false"

  use-ksu:
    default: "false"

  ksu-url-setup:
    default: "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh"

  ksu-version:
    default: ""

  use-anykernel3:
    default: "false"

  release:
    default: "false"

  release-name:
    default: "KernelBuild"
  
  use-extended-release-name:
    default: "false"

  access-token:
    required: false

runs:
  using: "composite"

  steps:

    # ----------------------------
    # INIT
    # ----------------------------
    - name: Init
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p build

        # convert inputs to bash env
        # kernel build
        echo "CLONE_DEPTH=${{ inputs.clone-depth }}" >> $GITHUB_ENV
        echo "KERNEL_URL=${{ inputs.kernel-url }}" >> $GITHUB_ENV
        echo "KERNEL_BRANCH=${{ inputs.kernel-branch }}" >> $GITHUB_ENV
        echo "DEFCONFIG=${{ inputs.defconfig }}" >> $GITHUB_ENV
        echo "ARCH=${{ inputs.arch }}" >> $GITHUB_ENV
        echo "USE_CUSTOM_CLANG=${{ inputs.use-custom-clang }}" >> $GITHUB_ENV
        echo "CLANG_URL=${{ inputs.clang-url }}" >> $GITHUB_ENV

        # cache
        echo "USE_CACHE=${{ inputs.use-cache}}" >> $GITHUB_ENV
        echo "SHOW_CACHE_STATS=$${{ inputs.show-cache-stats }}" >> $GITHUB_ENV

        # kernelsu
        echo "USE_KSU=${{ inputs.use-ksu }}" >> $GITHUB_ENV
        echo "KSU_URL_SETUP=${{ inputs.ksu-url }}" >> $GITHUB_ENV
        echo "KSU_VERSION=${{ inputs.ksu-version }}" >> $GITHUB_ENV

        # anykernel
        echo "USE_ANYKERNEL=${{ inputs.use-anykernel }}" >> $GITHUB_ENV

        # release
        echo "USE_RELEASE=${{ inputs.use-release }}" >> $GITHUB_ENV
        echo "RELEASE_NAME=${{ inputs.release-name }}" >> $GITHUB_ENV
        echo "USE_EXTENDED_RELEASE_NAME=${{ inputs.use-extended-release-name }}" >> $GITHUB_ENV


    # ----------------------------
    # DEPENDENCIES
    # ----------------------------
    - name: Install dependencies
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y \
          git make bc bison flex \
          lld llvm \
          aria2 curl wget \
          zip unzip build-essential python3

        if [[ $USE_CACHE == true ]]; then
          sudo apt-get install -y ccache
        fi

        if [[ $USE_CUSTOM_CLANG == false ]]; then
          sudo apt-get install -y clang
        fi

    # ----------------------------
    # CCACHE
    # ----------------------------
    - name: Setup ccache
      if: inputs.use-ccache == 'true'
      shell: bash
      run: |
        set -euo pipefail

        export CCACHE_DIR="$HOME/.ccache"
        export CCACHE_BASEDIR="$GITHUB_WORKSPACE"

        mkdir -p "$CCACHE_DIR"

        ccache -M 10G
        ccache -z

        echo "CCACHE_DIR=$CCACHE_DIR" >> $GITHUB_ENV
        echo "CC='ccache clang'" >> $GITHUB_ENV
        echo "CXX='ccache clang++'" >> $GITHUB_ENV

    # ----------------------------
    # CLONE KERNEL
    # ----------------------------
    - name: Clone kernel
      shell: bash
      run: |
        set -euo pipefail

        git clone \
          --depth=$CLONE_DEPTH \
          -b "$KERNEL_BRANCH" \
          "$KERNEL_URL" \
          target-kernel

    # ----------------------------
    # KERNELSU
    # ----------------------------
    - name: Setup KernelSU
      if: inputs.use-ksu == 'true'
      shell: bash
      run: |
        set -euo pipefail
        cd target-kernel
        if [[ $KSU_VERSION -eq "" ]]; then
          curl -fsSL "$KSU_URL_SETUP" | bash -
        else
          curl -fsSL "$KSU_URL_SETUP" | bash -s "$KSU_VERSION"
        fi

        if [[ $USE_EXTENDED_RELEASE_NAME -eq true ]]; then
          cd KernelSU
          KSU_VERSION=$(grep -E '^VERSION = ' Makefile | awk '{print $3}') >> $GITHUB_ENV
          KSU_PATCHLEVEL=$(grep -E '^PATCHLEVEL = ' Makefile | awk '{print $3}') >> $GITHUB_ENV
          KSU_SUBLEVEL=$(grep -E '^SUBLEVEL = ' Makefile | awk '{print $3}') >> $GITHUB_ENV
          KSU_KERNEL_SHA=$(git rev-parse --short HEAD) >> $GITHUB_ENV
        fi

    # ----------------------------
    # BUILD
    # ----------------------------
    - name: Build kernel
      shell: bash
      run: |
        set -euo pipefail
        cd target-kernel

        # ARCH is in GITHUBENV
        make O=out $DEFCONFIG

        # ARCH is in GITHUBENV
        make -j"$(nproc)" O=out \
          CC="${CC:-clang}"

    # ----------------------------
    # PACKAGE OUTPUTS (UNIFIED)
    # ----------------------------
    - name: Prepare artifacts
      shell: bash
      run: |
        set -euo pipefail

        mkdir -p build

        KERNEL_OUT="target-kernel/out/arch/$ARCH/boot"

        # Copy kernel image
        if ls $KERNEL_OUT/Image* 1> /dev/null 2>&1; then
          cp $KERNEL_OUT/Image* build/
        fi

        # Copy dtb/dtbo if exist
        [ -f "$KERNEL_OUT/dtb" ] && cp "$KERNEL_OUT/dtb" build/ || true
        [ -f "$KERNEL_OUT/dtbo.img" ] && cp "$KERNEL_OUT/dtbo.img" build/ || true

    # ----------------------------
    # ANYKERNEL3 PACKAGING
    # ----------------------------
    - name: Package AnyKernel3
      if: inputs.use-anykernel3 == 'true'
      shell: bash
      run: |
        set -euo pipefail

        git clone https://github.com/osm0sis/AnyKernel3.git ak3

        cp build/* ak3/ || true

        cd ak3

        zip -r "../${{ inputs.release-name }}.zip" ./*

        cd ..
        mv "${{ inputs.release-name }}.zip" build/

    # ----------------------------
    # ARTIFACT UPLOAD
    # ----------------------------
    - name: Upload kernel artifacts
      if: inputs.release == 'false'
      uses: actions/upload-artifact@v4
      with:
        name: kernel-build
        path: build/*

    # ----------------------------
    # ARTIFACT UPLOAD WITH ANYKERNEL
    # ----------------------------
    - name: Upload AnyKernel3 artifacts
      if: inputs.release == 'false' && inputs.use-anykernel3 == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: anykernel3-package
        path: build/*

    # ----------------------------
    # RELEASE
    # ----------------------------
    - name: Create Release
      if: inputs.release == 'true'
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ inputs.access-token }}
      with:
        name: ${{ inputs.release-name }}
        tag_name: ${{ inputs.release-name }}-${{ github.sha }}
        files: build/*
        make_latest: true