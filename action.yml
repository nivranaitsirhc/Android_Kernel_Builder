name: "Android Kernel Builder"
description: "Reliable CI action to build Android kernels with packaging and release support."

branding:
  icon: "activity"
  color: "blue"

inputs:

  clone-depth:
    default: "1"

  kernel-url:
    required: true

  kernel-branch:
    required: true

  defconfig:
    default: "defconfig"
    required: true

  arch:
    default: "arm64"
    required: true

  use-ccache:
    default: "false"

  ccache-stats:
    default: "false"

  use-ksu:
    default: "false"

  ksu-version:
    default: "main"

  use-anykernel3:
    default: "false"

  release:
    default: "false"

  release-name:
    default: "KernelBuild"

  access-token:
    required: false

runs:
  using: "composite"

  steps:

    # ----------------------------
    # INIT
    # ----------------------------
    - name: Init
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p build

    # ----------------------------
    # DEPENDENCIES
    # ----------------------------
    - name: Install dependencies
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y \
          git make bc bison flex \
          clang lld llvm \
          ccache aria2 curl wget \
          zip unzip build-essential python3

    # ----------------------------
    # CCACHE
    # ----------------------------
    - name: Setup ccache
      if: inputs.use-ccache == 'true'
      shell: bash
      run: |
        set -euo pipefail

        export CCACHE_DIR="$HOME/.ccache"
        export CCACHE_BASEDIR="$GITHUB_WORKSPACE"

        mkdir -p "$CCACHE_DIR"

        ccache -M 10G
        ccache -z

        echo "CCACHE_DIR=$CCACHE_DIR" >> $GITHUB_ENV
        echo "CC='ccache clang'" >> $GITHUB_ENV
        echo "CXX='ccache clang++'" >> $GITHUB_ENV

    # ----------------------------
    # CLONE KERNEL
    # ----------------------------
    - name: Clone kernel
      shell: bash
      run: |
        set -euo pipefail

        git clone \
          --depth=${{ inputs.clone-depth }} \
          -b "${{ inputs.kernel-branch }}" \
          "${{ inputs.kernel-url }}" \
          kernel

    # ----------------------------
    # KERNELSU
    # ----------------------------
    - name: Setup KernelSU
      if: inputs.use-ksu == 'true'
      shell: bash
      run: |
        set -euo pipefail
        cd kernel

        curl -fsSL \
          https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh \
          | bash -s "${{ inputs.ksu-version }}"

    # ----------------------------
    # BUILD
    # ----------------------------
    - name: Build kernel
      shell: bash
      run: |
        set -euo pipefail
        cd kernel

        make O=out ARCH=${{ inputs.arch }} ${{ inputs.defconfig }}

        make -j"$(nproc)" O=out ARCH=${{ inputs.arch }} \
          CC="${CC:-clang}"

    # ----------------------------
    # PACKAGE OUTPUTS (UNIFIED)
    # ----------------------------
    - name: Prepare artifacts
      shell: bash
      run: |
        set -euo pipefail

        mkdir -p build

        KERNEL_OUT="kernel/out/arch/${{ inputs.arch }}/boot"

        # Copy kernel image
        if ls $KERNEL_OUT/Image* 1> /dev/null 2>&1; then
          cp $KERNEL_OUT/Image* build/
        fi

        # Copy dtb/dtbo if exist
        [ -f "$KERNEL_OUT/dtb" ] && cp "$KERNEL_OUT/dtb" build/ || true
        [ -f "$KERNEL_OUT/dtbo.img" ] && cp "$KERNEL_OUT/dtbo.img" build/ || true

    # ----------------------------
    # ANYKERNEL3 PACKAGING
    # ----------------------------
    - name: Package AnyKernel3
      if: inputs.use-anykernel3 == 'true'
      shell: bash
      run: |
        set -euo pipefail

        git clone https://github.com/osm0sis/AnyKernel3.git ak3

        cp build/* ak3/ || true

        cd ak3
        zip -r "../${{ inputs.release-name }}.zip" ./*

        cd ..
        mv "${{ inputs.release-name }}.zip" build/

    # ----------------------------
    # ARTIFACT UPLOAD (uploada)
    # ----------------------------
    - name: Upload kernel artifacts
      if: inputs.release == 'false'
      uses: actions/upload-artifact@v4
      with:
        name: kernel-build
        path: build/*

    # ----------------------------
    # ARTIFACT UPLOAD (uploadb)
    # ----------------------------
    - name: Upload AnyKernel3 artifacts
      if: inputs.release == 'false' && inputs.use-anykernel3 == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: anykernel3-package
        path: build/*

    # ----------------------------
    # RELEASE
    # ----------------------------
    - name: Create Release
      if: inputs.release == 'true'
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ inputs.access-token }}
      with:
        name: ${{ inputs.release-name }}
        tag_name: ${{ inputs.release-name }}-${{ github.sha }}
        files: build/*
        make_latest: true
